<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNew Demo Mock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(at 10% 20%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            filter: blur(80px);
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <header class="sticky top-0 z-50 w-full glass">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-xl font-bold bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">
                CloudNew
            </div>
            <nav class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#" class="hover:text-indigo-400 transition-colors">プロジェクトを探す</a>
                <a href="#" class="hover:text-indigo-400 transition-colors">プロジェクトを始める</a>
            </nav>
            <div class="flex gap-4">
                <button class="px-4 py-2 text-sm font-medium hover:text-indigo-400 transition-colors">ログイン</button>
                <button class="px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-full shadow-lg">会員登録</button>
            </div>
        </div>
    </header>

    <main class="flex flex-col gap-20 pb-20">
        <section class="relative pt-24 pb-12 px-4 text-center space-y-8">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-xs font-semibold text-indigo-400">
                Next Generation Platform
            </div>
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight leading-tight">
                あなたの夢に、<br />
                <span class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">
                    新しい重力を。
                </span>
            </h1>
            <p className="max-w-2xl mx-auto text-lg text-slate-400">
                CloudNewは、革新的なアイデアと熱狂的な支援者を結びつける、次世代のプラットフォームです。
            </p>
            <div class="flex justify-center gap-4">
                <button class="px-8 py-4 bg-indigo-600 text-white rounded-full font-bold shadow-xl">プロジェクトを探す</button>
                <button class="px-8 py-4 glass rounded-full font-bold">詳細を見る</button>
            </div>
        </section>

        <section class="container mx-auto px-4 space-y-12">
            <h2 class="text-3xl font-bold">注目プロジェクト</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                    <div class="h-48 bg-slate-800 flex items-center justify-center text-slate-600 font-bold uppercase">Main Project Image</div>
                    <div class="p-6 space-y-4">
                        <h3 class="text-xl font-bold">革新的なスマート・デバイスの開発</h3>
                        <p class="text-sm text-slate-400 line-clamp-2">生活を豊かにし、人々の期待を超える価値を提供します。</p>
                        <div class="space-y-2">
                           <div class="flex justify-between text-xs"><span>達成率 75%</span><span>残り 12日</span></div>
                           <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-indigo-500 w-[75%]"></div></div>
                        </div>
                    </div>
                </div>
                <!-- 他のダミーカード ... -->
            </div>
        </section>
    </main>
</body>
</html>
