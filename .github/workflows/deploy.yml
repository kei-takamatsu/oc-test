name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and Stage All Projects
        run: |
          mkdir -p staging
          
          echo "Staging root index.html..."
          cp index.html staging/
          
          echo "Staging clock-sample..."
          cp -r clock-sample staging/
          
          echo "Building and Staging Oshitaku App..."
          cd oshitaku-app
          npm install
          npm run build
          mkdir -p ../staging/oshitaku-app
          cp -r dist/* ../staging/oshitaku-app/
          cd ..
          
          echo "Building and Staging Dashboard App..."
          cd dashboard
          npm install
          npm run build
          mkdir -p ../staging/dashboard
          cp -r dist/* ../staging/dashboard/
          cd ..
          
          echo "Staging complete. Staging folder contents:"
          ls -R staging
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
