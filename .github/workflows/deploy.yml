name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './oshitaku-app/package-lock.json'

      - name: Build Oshitaku App
        working-directory: ./oshitaku-app
        run: |
          npm install
          npm run build
          # Replace source with build output for GitHub Pages deployment
          # We keep the source safe in the repo, but the deployment artifact will have the built files.
          find . -maxdepth 1 ! -name 'dist' ! -name '.' ! -name 'node_modules' -exec rm -rf {} +
          cp -r dist/* ./
          rm -rf dist
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          # Optional: exclude node_modules from artifact to keep it small
          # (though they are in subfolders and upload-pages-artifact usually follows .gitignore or is selective)

          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
